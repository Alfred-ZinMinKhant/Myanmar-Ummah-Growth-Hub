<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Myanmar Ummah Growth Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ─── TOKENS ─────────────────────────────────────────────────────── */
    :root {
      --ink: #0e3a3f;
      --ink-2: #155059;
      --accent: #d8a55b;
      --warm: #e9c594;
      --cream: #f7f3ec;
      --paper: #fbf8f2;
      --line: rgba(14, 58, 63, 0.12);
      --muted: rgba(14, 58, 63, 0.65);
      --font-display: "DM Serif Display", Georgia, serif;
      --font-body: "Manrope", system-ui, sans-serif;
      --r-sm: 6px;
      --r-md: 12px;
      --r-lg: 22px;
      --r-xl: 36px;
      --maxw: 1240px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 80px;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-size: 16px;
      line-height: 1.55;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .container {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 28px;
    }

    @media (max-width: 720px) {
      .container {
        padding: 0 20px;
      }
    }

    .abs-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .ink-accent {
      color: var(--accent);
      font-style: italic;
    }

    .ink-accent-warm {
      color: var(--warm);
      font-style: italic;
    }

    /* ─── TYPE ───────────────────────────────────────────────────────── */
    .display {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(48px, 7vw, 96px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin: 18px 0 22px;
      text-wrap: balance;
    }

    .title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(34px, 4.4vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.015em;
      margin: 10px 0 22px;
      text-wrap: balance;
    }

    .title.on-dark {
      color: var(--cream);
    }

    .lede {
      font-size: clamp(17px, 1.45vw, 21px);
      line-height: 1.55;
      color: var(--ink-2);
      max-width: 46ch;
      margin: 0 0 32px;
      text-wrap: pretty;
    }

    .lede em {
      font-style: italic;
      color: var(--ink);
    }

    .big-p {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(20px, 1.9vw, 26px);
      line-height: 1.4;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin: 0 0 18px;
      text-wrap: pretty;
    }

    .big-p em {
      color: var(--accent);
      font-style: italic;
    }

    .big-p i {
      font-style: italic;
    }

    .eyebrow,
    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .section-kicker.on-dark {
      color: rgba(255, 255, 255, 0.7);
    }

    .section-kicker svg,
    .eyebrow svg {
      color: var(--accent);
    }

    .eyebrow-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(216, 165, 91, 0.18);
    }

    /* ─── BUTTONS ────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 11px 18px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.005em;
      transition: transform .15s ease, background .2s ease, color .2s ease, border .2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 13px;
    }

    .btn-lg {
      padding: 15px 24px;
      font-size: 15px;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--cream);
    }

    .btn-primary:hover {
      background: var(--ink-2);
    }

    .btn-warm {
      background: var(--accent);
      color: var(--ink);
    }

    .btn-warm:hover {
      background: var(--warm);
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border-color: var(--line);
    }

    .btn-ghost:hover {
      background: rgba(14, 58, 63, 0.04);
    }

    .btn-ghost-light {
      background: transparent;
      color: var(--cream);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-ghost-light:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    /* ─── NAV ────────────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      transition: background .25s ease, border .25s ease, backdrop-filter .25s ease;
      border-bottom: 1px solid transparent;
    }

    .nav-scrolled {
      background: rgba(251, 248, 242, 0.85);
      backdrop-filter: saturate(140%) blur(14px);
      -webkit-backdrop-filter: saturate(140%) blur(14px);
      border-bottom-color: var(--line);
    }

    .nav-inner {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--cream);
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.05;
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: 17px;
    }

    .brand-sub {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      gap: 28px;
      margin-left: auto;
      margin-right: 24px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-2);
      transition: color .2s ease;
      position: relative;
    }

    .nav-links a:hover {
      color: var(--ink);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -6px;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform .25s ease;
      transform-origin: left;
    }

    .nav-links a:hover::after {
      transform: scaleX(1);
    }

    .nav-toggle {
      display: none;
      background: none;
      border: 0;
      padding: 8px;
    }

    .nav-toggle span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--ink);
      margin: 5px 0;
    }

    .nav-mobile {
      display: none;
    }

    @media (max-width: 820px) {

      .nav-links,
      .nav-cta {
        display: none;
      }

      .nav-toggle {
        display: block;
      }

      .nav-mobile {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px 28px 24px;
        background: var(--paper);
        border-top: 1px solid var(--line);
      }

      .nav-mobile a {
        font-size: 16px;
        padding: 6px 0;
      }

      .nav-mobile .btn {
        align-self: flex-start;
      }
    }

    /* ─── HERO ──────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      padding: 120px 0 0;
      overflow: hidden;
      background:
        radial-gradient(1100px 500px at 80% -10%, rgba(216, 165, 91, 0.18), transparent 60%),
        radial-gradient(900px 600px at 0% 20%, rgba(21, 80, 89, 0.06), transparent 60%),
        var(--paper);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      opacity: 0.6;
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 64px;
      align-items: center;
      padding-top: 16px;
      padding-bottom: 56px;
      position: relative;
      z-index: 2;
    }

    .hero-copy {
      position: relative;
    }

    .hero-cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .hero-stats {
      display: inline-flex;
      align-items: center;
      gap: 28px;
      padding: 18px 24px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      backdrop-filter: blur(8px);
    }

    .hero-stats>div:not(.hero-divider) {
      display: flex;
      flex-direction: column;
    }

    .hero-stats b {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 24px;
      color: var(--ink);
      line-height: 1;
    }

    .hero-stats span {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .hero-divider {
      width: 1px;
      height: 32px;
      background: var(--line);
    }

    .hero-photo {
      position: relative;
      aspect-ratio: 4 / 3;
    }

    .photo-frame {
      position: absolute;
      inset: 0;
      border-radius: var(--r-lg);
      overflow: hidden;
      border: 1px solid var(--line);
      cursor: pointer;
      box-shadow:
        0 30px 60px -30px rgba(14, 58, 63, 0.35),
        0 12px 24px -16px rgba(14, 58, 63, 0.2);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-tag {
      position: absolute;
      left: 16px;
      bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(251, 248, 242, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink);
    }

    .photo-tag svg {
      color: var(--accent);
    }

    .photo-accent {
      position: absolute;
      top: -22px;
      right: -22px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      z-index: -1;
      opacity: 0.85;
    }

    .photo-mini {
      position: absolute;
      bottom: -34px;
      left: -34px;
      width: 36%;
      aspect-ratio: 1 / 1;
      border-radius: var(--r-md);
      overflow: hidden;
      border: 6px solid var(--paper);
      box-shadow: 0 16px 30px -12px rgba(14, 58, 63, 0.3);
    }

    .photo-mini img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 900px) {
      .hero {
        padding-top: 100px;
      }

      .hero-grid {
        grid-template-columns: 1fr;
        gap: 56px;
      }

      .hero-photo {
        aspect-ratio: 4 / 3;
        max-width: 540px;
      }

      .photo-mini {
        width: 32%;
        bottom: -24px;
        left: -16px;
        border-width: 4px;
      }
    }

    /* marquee */
    .hero-marquee {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.4);
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .marquee-track {
      display: flex;
      gap: 48px;
      animation: marquee 38s linear infinite;
      width: max-content;
      padding: 14px 0;
    }

    .marquee-row {
      display: flex;
      gap: 48px;
      padding-right: 48px;
    }

    .marquee-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .marquee-item svg {
      color: var(--accent);
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    /* ─── SECTIONS ──────────────────────────────────────────────────── */
    .section {
      padding: 120px 0;
      position: relative;
    }

    .section-head {
      margin-bottom: 56px;
      max-width: 720px;
    }

    .row-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      max-width: 100%;
    }

    .head-aside {
      font-size: 15px;
      color: var(--muted);
      max-width: 36ch;
      margin: 0;
      text-wrap: pretty;
    }

    @media (max-width: 720px) {
      .section {
        padding: 80px 0;
      }

      .row-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* ─── ABOUT ─────────────────────────────────────────────────────── */
    .about {
      background: var(--paper);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 80px;
      align-items: flex-start;
    }

    .about-grid .section-head {
      margin-bottom: 0;
      position: sticky;
      top: 100px;
    }

    .about-body p {
      font-size: 16px;
      color: var(--ink-2);
      margin-bottom: 18px;
      max-width: 56ch;
    }

    .about-body p i {
      font-style: italic;
    }

    .about-pillars {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 48px;
    }

    .pillar {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      background: rgba(255, 255, 255, 0.5);
      transition: border .2s ease, transform .2s ease;
    }

    .pillar:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .pillar-mark {
      color: var(--accent);
      margin-bottom: 14px;
    }

    .pillar h4 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 22px;
      margin: 0 0 8px;
    }

    .pillar p {
      font-size: 14px;
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .about-grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .about-grid .section-head {
        position: static;
      }

      .about-pillars {
        grid-template-columns: 1fr;
      }
    }

    /* ─── COMMUNITY GALLERY ────────────────────────────────────────── */
    .community {
      background: linear-gradient(180deg, transparent, rgba(216, 165, 91, 0.06));
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 180px;
      gap: 16px;
    }

    .tile {
      position: relative;
      margin: 0;
      border-radius: var(--r-md);
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--ink);
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .8s cubic-bezier(.2, .7, .2, 1);
    }

    .tile:hover img {
      transform: scale(1.04);
    }

    .tile figcaption {
      position: absolute;
      left: 14px;
      bottom: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: rgba(251, 248, 242, 0.92);
      backdrop-filter: blur(6px);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.04em;
    }

    .tile figcaption svg {
      color: var(--accent);
    }

    .tile-tall {
      grid-row: span 2;
    }

    .tile-wide {
      grid-column: span 2;
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 160px;
      }

      .tile-wide {
        grid-column: span 2;
      }

      .tile-tall {
        grid-row: span 2;
      }
    }

    /* ─── EVENTS ────────────────────────────────────────────────────── */
    .events {
      background: var(--paper);
    }

    .event-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .event {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      background: rgba(255, 255, 255, 0.6);
      display: flex;
      flex-direction: column;
      transition: border .25s ease, transform .25s ease, background .25s ease;
    }

    .event:hover {
      border-color: var(--accent);
      background: #fff;
      transform: translateY(-3px);
    }

    .event-type {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .type-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      background: rgba(216, 165, 91, 0.18);
      color: var(--ink);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .type-pill svg {
      color: var(--ink);
    }

    .event-title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 24px;
      line-height: 1.2;
      margin: 0 0 10px;
    }

    .event-blurb {
      font-size: 14px;
      color: var(--ink-2);
      margin: 0 0 20px;
      line-height: 1.55;
      flex-grow: 1;
    }

    .event-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      padding-top: 16px;
      border-top: 1px dashed var(--line);
      margin-bottom: 12px;
    }

    .event-meta span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .event-meta svg {
      color: var(--accent);
      flex-shrink: 0;
    }

    @media (max-width: 900px) {
      .event-list {
        grid-template-columns: 1fr;
      }
    }

    /* ─── JOIN ──────────────────────────────────────────────────────── */
    .join {
      padding: 80px 0;
    }

    .join-card {
      position: relative;
      background:
        radial-gradient(800px 400px at 100% 0%, rgba(216, 165, 91, 0.25), transparent 50%),
        linear-gradient(135deg, var(--ink), var(--ink-2));
      border-radius: var(--r-xl);
      padding: 80px 64px;
      overflow: hidden;
      color: var(--cream);
      isolation: isolate;
    }

    .join-card .abs-fill {
      z-index: 0;
    }

    .join-inner {
      position: relative;
      z-index: 1;
      max-width: 720px;
    }

    .join-lede {
      font-size: 18px;
      color: rgba(247, 243, 236, 0.85);
      max-width: 52ch;
      margin: 0 0 36px;
      line-height: 1.55;
      text-wrap: pretty;
    }

    .join-cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .join-bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .join-bullets li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: rgba(247, 243, 236, 0.85);
    }

    .join-bullets svg {
      color: var(--accent);
      flex-shrink: 0;
    }

    @media (max-width: 720px) {
      .join-card {
        padding: 56px 32px;
        border-radius: var(--r-lg);
      }
    }

    /* ─── FOOTER ────────────────────────────────────────────────────── */
    .footer {
      background: var(--ink);
      color: var(--cream);
      padding: 64px 0 24px;
    }

    .footer .brand-mark {
      background: var(--cream);
      color: var(--ink);
    }

    .footer .brand-sub {
      color: rgba(247, 243, 236, 0.6);
    }

    .footer-inner {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 48px;
      padding-bottom: 48px;
      border-bottom: 1px solid rgba(247, 243, 236, 0.12);
    }

    .footer-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .footer-cols h5 {
      font-family: var(--font-body);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(247, 243, 236, 0.5);
      margin: 0 0 14px;
    }

    .footer-cols a,
    .footer-cols span {
      display: block;
      font-size: 14px;
      color: rgba(247, 243, 236, 0.8);
      padding: 4px 0;
    }

    .footer-cols a:hover {
      color: var(--accent);
    }

    .footer-bottom {
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(247, 243, 236, 0.5);
    }

    @media (max-width: 720px) {
      .footer-inner {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .footer-cols {
        grid-template-columns: repeat(2, 1fr);
      }

      .footer-bottom {
        flex-direction: column;
        gap: 6px;
      }
    }

    /* ─── MODAL ─────────────────────────────────────────────────────── */
    .modal-bg {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(14, 58, 63, 0.55);
      backdrop-filter: blur(6px);
      display: grid;
      place-items: center;
      padding: 24px;
      animation: fade .2s ease;
    }

    .modal {
      position: relative;
      background: var(--paper);
      border-radius: var(--r-lg);
      padding: 40px 36px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 60px -20px rgba(14, 58, 63, 0.4);
      animation: pop .25s cubic-bezier(.2, .7, .2, 1);
    }

    .modal-mark {
      color: var(--accent);
      margin-bottom: 12px;
      display: inline-block;
    }

    .modal h3 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 28px;
      margin: 0 0 12px;
    }

    .modal p {
      color: var(--muted);
      font-size: 15px;
      margin: 0 0 24px;
    }

    .modal .btn {
      margin-bottom: 14px;
    }

    .modal-fine {
      font-size: 12px;
      color: var(--muted);
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: 0;
      font-size: 28px;
      color: var(--muted);
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--ink);
    }

    @keyframes fade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── ICONS ─────────────────────────────────────────────────────────
    const IconStar = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4">
        <path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" />
      </svg>
    );
    const IconArrow = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <path d="M5 12h14M13 5l7 7-7 7" />
      </svg>
    );
    const IconFB = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
        <path d="M13 22v-8h3l1-4h-4V7.5c0-1.1.4-2 2-2h2V2h-3c-3 0-5 1.8-5 5v3H6v4h3v8h4z" />
      </svg>
    );
    const IconCalendar = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4">
        <rect x="3" y="5" width="18" height="16" rx="2" /><path d="M3 10h18M8 3v4M16 3v4" />
      </svg>
    );
    const IconPin = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4">
        <path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13z" /><circle cx="12" cy="9" r="2.5" />
      </svg>
    );
    const IconMonitor = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4">
        <rect x="3" y="4" width="18" height="13" rx="2" /><path d="M8 21h8M12 17v4" />
      </svg>
    );

    // ─── ISLAMIC GEOMETRIC PATTERN ─────────────────────────────────────
    const StarPattern = ({ color = "currentColor", opacity = 0.08, id = "p1" }) => (
      <svg className="abs-fill" aria-hidden="true">
        <defs>
          <pattern id={id} width="80" height="80" patternUnits="userSpaceOnUse">
            <g fill="none" stroke={color} strokeWidth="0.8" opacity={opacity}>
              <g transform="translate(40 40)">
                <rect x="-18" y="-18" width="36" height="36" transform="rotate(0)" />
                <rect x="-18" y="-18" width="36" height="36" transform="rotate(45)" />
              </g>
              <g transform="translate(0 0)">
                <rect x="-18" y="-18" width="36" height="36" />
                <rect x="-18" y="-18" width="36" height="36" transform="rotate(45)" />
              </g>
              <g transform="translate(80 0)">
                <rect x="-18" y="-18" width="36" height="36" />
                <rect x="-18" y="-18" width="36" height="36" transform="rotate(45)" />
              </g>
              <g transform="translate(0 80)">
                <rect x="-18" y="-18" width="36" height="36" />
                <rect x="-18" y="-18" width="36" height="36" transform="rotate(45)" />
              </g>
              <g transform="translate(80 80)">
                <rect x="-18" y="-18" width="36" height="36" />
                <rect x="-18" y="-18" width="36" height="36" transform="rotate(45)" />
              </g>
            </g>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#${id})`} />
      </svg>
    );

    const StarGlyph = ({ size = 22, stroke = 1.2 }) => (
      <svg width={size} height={size} viewBox="-22 -22 44 44" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinejoin="round">
        <rect x="-15" y="-15" width="30" height="30" />
        <rect x="-15" y="-15" width="30" height="30" transform="rotate(45)" />
      </svg>
    );

    // ─── NAV ─────────────────────────────────────────────────────────
    function Nav({ onJoin }) {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 24);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      const links = [
        ['About', 'about'],
        ['Community', 'community'],
        ['Events', 'events'],
        ['Join', 'join'],
      ];
      const go = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
        setOpen(false);
      };
      return (
        <nav className={`nav ${scrolled ? 'nav-scrolled' : ''}`}>
          <div className="nav-inner">
            <a href="#top" className="brand" onClick={(e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
              <span className="brand-text">
                <span className="brand-name">Myanmar Ummah</span>
                <span className="brand-sub">Growth Hub</span>
              </span>
            </a>
            <div className="nav-links">
              {links.map(([label, id]) => (
                <a key={id} href={`#${id}`} onClick={(e) => { e.preventDefault(); go(id); }}>{label}</a>
              ))}
            </div>
            <button className="btn btn-primary btn-sm nav-cta" onClick={onJoin}>
              <IconFB size={14} /> Join
            </button>
            <button className="nav-toggle" onClick={() => setOpen(o => !o)} aria-label="menu">
              <span /><span /><span />
            </button>
          </div>
          {open && (
            <div className="nav-mobile">
              {links.map(([label, id]) => (
                <a key={id} href={`#${id}`} onClick={(e) => { e.preventDefault(); go(id); }}>{label}</a>
              ))}
              <button className="btn btn-primary" onClick={onJoin}><IconFB size={14} /> Join Our Community</button>
            </div>
          )}
        </nav>
      );
    }

    // ─── HERO ────────────────────────────────────────────────────────
    function Hero({ onJoin }) {
      return (
        <header id="top" className="hero">
          <div className="hero-bg">
            <StarPattern color="var(--ink)" opacity={0.06} id="hero-pat" />
          </div>
          <div className="container hero-grid">
            <div className="hero-copy">
              <div className="eyebrow">
                <span className="eyebrow-dot" /> For Myanmar Muslims in Thailand
              </div>
              <h1 className="display">
                Myanmar <span className="ink-accent">Ummah</span><br />
                Growth Hub.
              </h1>
              <p className="lede">
                A community for Myanmar Muslims to grow in
                <em> career, knowledge, and life</em> — together.
              </p>
              <div className="hero-cta">
                <button className="btn btn-primary btn-lg" onClick={onJoin}>
                  <IconFB size={16} /> Join Our Community
                </button>
                <a href="#about" className="btn btn-ghost btn-lg" onClick={(e) => { e.preventDefault(); window.scrollTo({ top: document.getElementById('about').offsetTop - 60, behavior: 'smooth' }); }}>
                  Our story <IconArrow size={14} />
                </a>
              </div>
              <div className="hero-stats">
                <div><b>Thailand</b><span>Based</span></div>
                <div className="hero-divider" />
                <div><b>Online</b><span>+ in person</span></div>
                <div className="hero-divider" />
                <div><b>Est. 2026</b><span>Bangkok</span></div>
              </div>
            </div>
            <div className="hero-photo">
              <div className="photo-frame" onClick={() => window.dispatchEvent(new CustomEvent('preview', { detail: { src: 'assets/group-photo.jpeg', cap: 'Bangkok · April 2026' } }))}>
                <img src="assets/group-photo.jpeg" alt="Myanmar Ummah Growth Hub members" />
                <div className="photo-tag">
                  <span>Bangkok · April 2026</span>
                </div>
              </div>
              <div className="photo-accent" style={{ background: 'var(--accent)' }} />
              <div className="photo-mini">
                <img src="assets/discussion-circle.jpeg" alt="Discussion" />
              </div>
            </div>
          </div>
          <div className="hero-marquee">
            <div className="marquee-track">
              {Array.from({ length: 2 }).map((_, k) => (
                <div key={k} className="marquee-row">
                  {['Personal Development', 'Career Growth', 'Knowledge Sharing', 'Brotherhood & Sisterhood', 'Leadership', 'Mentorship'].map((t, i) => (
                    <span key={i} className="marquee-item">{t}</span>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </header>
      );
    }

    // ─── ABOUT ───────────────────────────────────────────────────────
    function Pillar({ title, body }) {
      return (
        <div className="pillar">
          <div className="pillar-mark"></div>
          <h4>{title}</h4>
          <p>{body}</p>
        </div>
      );
    }

    function About() {
      return (
        <section id="about" className="section about">
          <div className="container about-grid">
            <div className="section-head">
              <div className="section-kicker">Our Story</div>
              <h2 className="title">Born from a circle<br />of young leaders.</h2>
            </div>
            <div className="about-body">
              <p className="big-p">
                We started in Bangkok, sitting on a hotel floor at the
                <em> Youth Educational and Leadership Camp</em> for the future
                leaders of the Muslim community of Myanmar — twelve strangers,
                one whiteboard, and a question: <i>what happens after we go home?</i>
              </p>
              <p>
                The Myanmar Ummah Growth Hub is the answer. A place for students,
                developers, freelancers and early-career professionals to keep
                learning from each other, share opportunities, and build the kind
                of trust that lasts longer than a weekend.
              </p>
              <div className="about-pillars">
                <Pillar title="Growth" body="Career skills, study circles, and mentorship — practical and consistent." />
                <Pillar title="Support" body="Real people you can ask the awkward questions. No gatekeeping." />
                <Pillar title="Unity" body="Myanmar Muslims across borders, sects, and stages of life." />
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ─── COMMUNITY ───────────────────────────────────────────────────
    function Community() {
      const tiles = [
        { src: 'assets/discussion-circle.jpeg', cap: 'Learning together', span: 'tall' },
        { src: 'assets/presentation.jpeg', cap: 'Sharing the floor', span: 'wide' },
        { src: 'assets/group-photo.jpeg', cap: 'Building connections', span: 'wide' },
        { src: 'assets/event-poster.jpeg', cap: 'Bangkok · April 2026', span: 'tall' },
      ];
      return (
        <section id="community" className="section community">
          <div className="container">
            <div className="section-head row-head">
              <div>
                <div className="section-kicker">Community</div>
                <h2 className="title">Real people. Real moments.</h2>
              </div>
            </div>
            <div className="gallery">
              {tiles.map((t, i) => (
                <figure key={i} className={`tile tile-${t.span}`}>
                  <img src={t.src} alt={t.cap} onClick={() => window.dispatchEvent(new CustomEvent('preview', { detail: { src: t.src, cap: t.cap } }))} />
                  <figcaption>
                    {t.cap}
                  </figcaption>
                </figure>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── IDEAS ───────────────────────────────────────────────────────
    function Events() {
      const ideas = [
        {
          type: 'Online',
          icon: <IconMonitor size={14} />,
          title: 'Monthly Virtual Meetup',
          when: 'Once a month, on Zoom',
          where: 'Anyone in the group can join',
          blurb: 'A relaxed online circle. Short member talks, then small breakouts by interest — career, study, deen, life.',
        },
        {
          type: 'Same City',
          icon: <IconPin size={14} />,
          title: 'Bangkok Coffee Meetups',
          when: 'Whenever a few of us are free',
          where: 'Cafes around Bangkok',
          blurb: 'Members in the same city catching up over coffee — introduce yourself, share what you\'re working on, and meet someone new.',
        },
        {
          type: 'Same City',
          icon: <IconPin size={14} />,
          title: 'Mae Sot & Beyond',
          when: 'When members ask for it',
          where: 'Any Thai city with members',
          blurb: 'Wherever a handful of Myanmar Muslims in Thailand are nearby, we help each other find each other.',
        },
        {
          type: 'Past',
          icon: <IconStar size={14} />,
          title: 'Youth Educational & Leadership Camp',
          when: '25\u201326 April 2026',
          where: 'Al-Meroz Hotel, Bangkok',
          blurb: 'Two days with future leaders of the Muslim community of Myanmar — the camp where this community first came together.',
        },
      ];
      return (
        <section id="events" className="section events">
          <div className="container">
            <div className="section-head row-head">
              <div>
                <div className="section-kicker">What we do</div>
                <h2 className="title">Ideas, not a calendar.</h2>
              </div>
              <p className="head-aside">
                We're a small community in Thailand — meetups happen when members
                want them. The Facebook group is where they get planned.
              </p>
            </div>

            <div className="event-list">
              {ideas.map((e, i) => (
                <article key={i} className="event">
                  <div className="event-type">
                    <span className="type-pill">{e.icon} {e.type}</span>
                  </div>
                  <h3 className="event-title">{e.title}</h3>
                  <p className="event-blurb">{e.blurb}</p>
                  <div className="event-meta">
                    <span><IconCalendar size={14} /> {e.when}</span>
                    <span><IconPin size={14} /> {e.where}</span>
                  </div>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── JOIN ────────────────────────────────────────────────────────
    function Join({ onJoin }) {
      return (
        <section id="join" className="section join">
          <div className="container join-card">
            <StarPattern color="#fff" opacity={0.08} id="join-pat" />
            <div className="join-inner">
              <div className="section-kicker on-dark">Join us</div>
              <h2 className="title on-dark">
                Start your journey<br />
                <span className="ink-accent-warm">with us.</span>
              </h2>
              <p className="join-lede">
                We meet on Facebook first — that's where members post wins,
                ask questions, and plan the next meetup. Just introduce
                yourself when you arrive.
              </p>
              <div className="join-cta">
                <button className="btn btn-warm btn-lg" onClick={onJoin}>
                  <IconFB size={16} /> Join the Facebook Group
                </button>
                <a href="#events" className="btn btn-ghost-light btn-lg" onClick={(e) => { e.preventDefault(); window.scrollTo({ top: document.getElementById('events').offsetTop - 60, behavior: 'smooth' }); }}>
                  See upcoming events
                </a>
              </div>
              <ul className="join-bullets">
                <li>For Myanmar Muslims living in Thailand</li>
                <li>Students, professionals, parents — all welcome</li>
                <li>Friendly, moderated, no spam</li>
              </ul>
            </div>
          </div>
        </section>
      );
    }

    // ─── FOOTER ──────────────────────────────────────────────────────
    function Footer() {
      return (
        <footer className="footer">
          <div className="container footer-inner">
            <div className="brand">
              <span className="brand-text">
                <span className="brand-name">Myanmar Ummah</span>
                <span className="brand-sub">Growth Hub</span>
              </span>
            </div>
            <div className="footer-cols">
              <div>
                <h5>Community</h5>
                <a href="#about">About</a>
                <a href="#community">Members</a>
                <a href="#events">Events</a>
              </div>
              <div>
                <h5>Connect</h5>
                <a href="#join">Facebook Group</a>
              </div>
            </div>
          </div>
          <div className="footer-bottom container">
            <span>&copy; 2026 Myanmar Ummah Growth Hub</span>
            <span>Made with care, By Zin Min Khant @ Alfred</span>
          </div>
        </footer>
      );
    }

    // ─── JOIN MODAL ──────────────────────────────────────────────────
    function JoinModal({ open, onClose }) {
      if (!open) return null;
      return (
        <div className="modal-bg" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}>&times;</button>
            <div className="modal-mark">Mae Sot</div>
            <h3>You're one click away.</h3>
            <p>Our community lives in a private Facebook group. Tap below to open it — answer two short questions and you're in.</p>
            <a className="btn btn-primary btn-lg" href="https://www.facebook.com/share/g/1AfxWbeaKZ/" target="_blank" rel="noopener">
              <IconFB size={16} /> Open Facebook Group
            </a>
            <p className="modal-fine">We'll never email you, and we don't sell anything.</p>
          </div>
        </div>
      );
    }

    function PreviewModal({ open, src, cap, onClose }) {
      if (!open) return null;
      return (
        <div className="modal-bg" onClick={onClose}>
          <div className="modal" style={{ maxWidth: '880px', padding: 20 }} onClick={(e) => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}>&times;</button>
            <div style={{ marginBottom: 12 }}>
              <img src={src} alt={cap} style={{ width: '100%', height: 'auto', borderRadius: 8 }} />
            </div>
            {cap && <div style={{ color: 'var(--muted)', fontSize: 13 }}>{cap}</div>}
          </div>
        </div>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────
    function App() {
      const [modal, setModal] = useState(false);
      const [preview, setPreview] = useState({ open: false, src: '', cap: '' });
      const onJoin = () => setModal(true);

      useEffect(() => {
        const handler = (e) => {
          const { src, cap } = e.detail || {};
          if (src) setPreview({ open: true, src, cap: cap || '' });
        };
        window.addEventListener('preview', handler);
        return () => window.removeEventListener('preview', handler);
      }, []);

      return (
        <>
          <Nav onJoin={onJoin} />
          <Hero onJoin={onJoin} />
          <About />
          <Community />
          <Events />
          <Join onJoin={onJoin} />
          <Footer />
          <JoinModal open={modal} onClose={() => setModal(false)} />
          <PreviewModal open={preview.open} src={preview.src} cap={preview.cap} onClose={() => setPreview({ open: false, src: '', cap: '' })} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
